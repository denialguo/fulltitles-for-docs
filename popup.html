<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FullTitles for Docs</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 220px; padding: 12px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; }
    select { width: 100%; padding: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <label for="fontSize">Homepage title font size</label>
  <select id="fontSize">
    <option value="11">11px</option>
    <option value="12">12px</option>
    <option value="13">13px</option>
    <option value="14">14px (default)</option>
    <option value="16">16px</option>
    <option value="18">18px</option>
    <option value="20">20px</option>
  </select>
  <script src="popup.js"></script>
</body>
</html>
